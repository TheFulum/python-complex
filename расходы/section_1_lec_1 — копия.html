<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Кастомный алерт</title>
		<link
			href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
			rel="stylesheet"
		/>
	</head>
	<body>
		<button type="button" class="btn btn-primary" onclick="checkAnswers()">
			Показать результаты
		</button>

		<!-- Модальное окно для отображения результатов -->
		<div
			class="modal fade"
			id="testResultModal"
			tabindex="-1"
			role="dialog"
			aria-labelledby="testResultModalLabel"
			aria-hidden="true"
		>
			<div class="modal-dialog" role="document">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title" id="testResultModalLabel">
							Результаты теста
						</h5>
						<button
							type="button"
							class="close"
							data-dismiss="modal"
							aria-label="Close"
						>
							<span aria-hidden="true">&times;</span>
						</button>
					</div>
					<div class="modal-body" id="testResultModalBody">
						<!-- Содержимое модального окна с результатами -->
					</div>
					<div class="modal-footer">
						<button
							type="button"
							class="btn btn-secondary"
							data-dismiss="modal"
						>
							Закрыть
						</button>
					</div>
				</div>
			</div>
		</div>

		<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
		<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

		<script>
			function checkAnswers() {
				// Ваш код проверки ответов здесь
				// Вместо этого добавьте ваш код проверки
				// Чтобы показать модальное окно, вы можете использовать следующий код
				$('#testResultModal').modal('show')
			}
		</script>
	</body>
</html>
