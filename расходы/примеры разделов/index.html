<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>List Group Example</title>
		<!-- Подключение Bootstrap CSS -->
		<link
			href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
			rel="stylesheet"
		/>
	</head>
	<body>
		<div class="container">
			<div class="row">
				<div class="col" style="width: 10%">
					<h2>Первый список</h2>
					<ul class="list-group">
						<li class="list-group-item">Первый элемент</li>
						<li class="list-group-item">Второй элемент</li>
						<li class="list-group-item">Третий элемент</li>
						<li class="list-group-item">Четвертый элемент</li>
						<li class="list-group-item">Пятый элемент</li>
					</ul>
				</div>
				<div class="col" style="width: 10%">
					<h2>Второй список</h2>
					<ul class="list-group">
						<li class="list-group-item">Шестой элемент</li>
						<li class="list-group-item">Седьмой элемент</li>
						<li class="list-group-item">Восьмой элемент</li>
						<li class="list-group-item">Девятый элемент</li>
						<li class="list-group-item">Десятый элемент</li>
					</ul>
				</div>
			</div>
		</div>

		<!-- Подключение Bootstrap JS (необходимо для некоторых компонентов) -->
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
		<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
	</body>
</html>
